name: "Publish Plugin"

on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish'
        required: true
        default: 'v1.0.0.0'

jobs:
  build:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/build.yaml@master
    with:
      dotnet-version: "9.0.*"
      dotnet-target: "net9.0"

  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - build
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Prepare GitHub Release assets
        run: |-
          for file in ./*; do
            md5sum ${file#./} >> ${file%.*}.md5
            sha256sum ${file#./} >> ${file%.*}.sha256
          done
          ls -l

      - name: Get Release Upload URL
        id: get-release
        run: |
          TAG="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          UPLOAD_URL=$(gh api repos/$OWNER/$REPO/releases/tags/$TAG --jq '.upload_url')
          echo "upload_url=$UPLOAD_URL" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}

      - name: Upload GitHub Release assets
        uses: shogo82148/actions-upload-release-asset@v1.9.2
        with:
          upload_url: ${{ steps.get-release.outputs.upload_url }}
          asset_path: ./*

  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - upload
    steps:
      - name: Jellyfin plugin repo
        uses: Kevinjil/jellyfin-plugin-repo-action@v0.4.3
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
