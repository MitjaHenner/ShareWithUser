<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Share With User</title>
    </head>
    <body>
        <div id="shareWithUserConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-select,emby-checkbox">
            <div data-role="content">
                <div class="content-primary">
                    <style>
                        #shareWithUserConfigForm {
                            padding-top: 1.5em;
                            padding-left: 1em;
                            padding-right: 1em;
                        }

                        #shareWithUserConfigForm .checkboxContainer {
                            margin-bottom: 1.5em;
                        }

                        .shared-media-section {
                            margin-top: 2em;
                        }

                        .shared-media-section h3 {
                            margin-bottom: 1em;
                        }

                        .shared-media-user-group {
                            margin-bottom: 1.5em;
                            padding: 0.8em 1em;
                            border-radius: 0.4em;
                            background: var{emby-cardmenu};
                        }

                        .shared-media-user-header {
                            display: flex;
                            align-items: center;
                            gap: 0.6em;
                            margin-bottom: 0.5em;
                        }

                        .shared-media-avatar {
                            width: 32px;
                            height: 32px;
                            border-radius: 50%;
                            object-fit: cover;
                        }

                        .shared-media-username {
                            font-weight: bold;
                            font-size: 1.1em;
                        }

                        .shared-media-list {
                            list-style: none;
                            padding: 0 0 0 2em;
                            margin: 0;
                        }

                        .shared-media-list li {
                            padding: 0.3em 0;
                            display: flex;
                            align-items: center;
                            gap: 0.5em;
                        }

                        .shared-media-list li .item-icon {
                            color: var{emby-button-fill-active};
                            font-size: 1.3em;
                            min-width: 24px;
                            text-align: center;
                        }

                        .shared-media-list li a {
                            color: inherit;
                            text-decoration: underline;
                            text-underline-offset: 2px;
                        }

                        .shared-media-list li a:hover {
                            color: var{emby-button-fill-active};
                        }

                        .shared-media-empty {
                            color: var{emby-button-fill};
                            font-style: italic;
                            padding: 0.3em 0;
                        }

                        .shared-media-loading {
                            text-align: center;
                            padding: 2em;
                            color: var{emby-button-fill};
                        }

                        .shared-media-context-backdrop {
                            background-color: #000;
                            opacity: 0.5;
                            position: fixed !important;
                            top: 0 !important;
                            bottom: 0 !important;
                            left: 0 !important;
                            right: 0 !important;
                            margin: 0 !important;
                            z-index: 999998 !important;
                            display: none;
                        }

                        .shared-media-context-backdrop.visible {
                            display: block;
                        }

                        .shared-media-context-menu {
                            position: fixed;
                            z-index: 999999 !important;
                            min-width: 240px;
                            padding: 0.4em 0;
                            background: #1a1a1a;
                            border-radius: 0.2em;
                            box-shadow: 0 16px 24px 2px rgba(0, 0, 0, 0.14), 0 6px 30px 5px rgba(0, 0, 0, 0.12), 0 8px 10px -5px rgba(0, 0, 0, 0.4);
                            display: none;
                        }

                        .shared-media-context-menu.visible {
                            display: block;
                        }

                        .shared-media-context-menu button {
                            display: flex;
                            align-items: center;
                            width: 100%;
                            padding: 0.8em;
                            border: none;
                            margin: 0;
                            background: none;
                            color: inherit;
                            font-size: 1em;
                            cursor: pointer;
                            text-align: left;
                        }

                        .shared-media-context-menu button:hover,
                        .shared-media-context-menu button:focus {
                            background: rgba(255, 255, 255, 0.1);
                        }

                        .shared-media-context-menu button .material-icons {
                            font-size: 1.3em;
                            margin-right: 0.85em;
                            margin-left: 0.45em;
                            padding: 0;
                        }
                    </style>
                    <form id="shareWithUserConfigForm">
                        <div class="checkboxContainer checkboxContainer-withDescription">
                            <label class="emby-checkbox-label">
                                <input id="IsEnabled" name="TrueFalseCheckBox" type="checkbox" is="emby-checkbox" />
                                <span>Enable share context menu</span>
                            </label>
                        </div>

                        <div class="shared-media-section">
                            <h3>Shared Media</h3>
                            <div id="sharedMediaContainer">
                                <div class="shared-media-loading">Loading...</div>
                            </div>
                        </div>

                        <div id="sharedMediaContextBackdrop" class="shared-media-context-backdrop"></div>
                        <div id="sharedMediaContextMenu" class="shared-media-context-menu">
                            <button id="ctxOpenDetails">
                                <span class="material-icons">info</span>
                                <span>Open details</span>
                            </button>
                            <button id="ctxRemoveShare">
                                <span class="material-icons">delete</span>
                                <span>Remove share</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <script type="text/javascript">
                var ShareWithUserConfig = {
                    pluginUniqueId: "d5b7527c-3c98-4813-8fe7-ce7b31022c53",
                };

                document.querySelector("#shareWithUserConfigPage").addEventListener("pageshow", function () {
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(ShareWithUserConfig.pluginUniqueId).then(function (config) {
                        document.querySelector("#IsEnabled").checked = config.IsEnabled;
                        Dashboard.hideLoadingMsg();
                        loadSharedMedia();
                    });
                });

                document.querySelector("#IsEnabled").addEventListener("change", function () {
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(ShareWithUserConfig.pluginUniqueId).then(function (config) {
                        config.IsEnabled = document.querySelector("#IsEnabled").checked;
                        ApiClient.updatePluginConfiguration(ShareWithUserConfig.pluginUniqueId, config).then(function (result) {
                            Dashboard.processPluginConfigurationUpdateResult(result);
                        });
                    });
                });

                // Context menu state
                var contextMenuState = { itemId: null, username: null };

                document.querySelector("#sharedMediaContextMenu").addEventListener("contextmenu", function (e) {
                    e.preventDefault();
                    hideContextMenu();
                });

                document.querySelector("#ctxRemoveShare").addEventListener("click", function () {
                    var state = contextMenuState;
                    hideContextMenu();
                    if (!state.itemId || !state.username) return;

                    Dashboard.showLoadingMsg();
                    var currentUserId = ApiClient.getCurrentUserId();
                    ApiClient.getItem(currentUserId, state.itemId)
                        .then(function (item) {
                            var currentTags = item.Tags || [];
                            var newTags = currentTags.filter(function (tag) {
                                return tag !== state.username;
                            });

                            ApiClient.ajax({
                                url: ApiClient.getUrl("Plugins/ShareWithUser/ShareTags"),
                                type: "POST",
                                contentType: "application/json",
                                data: JSON.stringify({ itemId: state.itemId, tags: newTags }),
                            })
                                .then(function () {
                                    Dashboard.hideLoadingMsg();
                                    loadSharedMedia();
                                })
                                .catch(function (err) {
                                    Dashboard.hideLoadingMsg();
                                    console.error("[ShareWithUser] Failed to remove share:", err);
                                    Dashboard.alert({ text: "Failed to remove share (HTTP " + err.status + ")." });
                                });
                        })
                        .catch(function (err) {
                            Dashboard.hideLoadingMsg();
                            console.error("[ShareWithUser] Failed to fetch item:", err);
                            Dashboard.alert({ text: "Failed to fetch item details." });
                        });
                });

                document.querySelector("#sharedMediaContextBackdrop").addEventListener("click", hideContextMenu);

                document.querySelector("#ctxOpenDetails").addEventListener("click", function () {
                    hideContextMenu();
                    if (!contextMenuState.itemId) return;
                    window.top.location.hash = "#/details?id=" + contextMenuState.itemId;
                });

                document.addEventListener("keydown", function (e) {
                    if (e.key === "Escape") hideContextMenu();
                });

                function hideContextMenu() {
                    document.querySelector("#sharedMediaContextMenu").classList.remove("visible");
                    document.querySelector("#sharedMediaContextBackdrop").classList.remove("visible");
                }

                function showContextMenu(itemId, username, e) {
                    e.preventDefault();
                    contextMenuState = { itemId: itemId, username: username };
                    var menu = document.querySelector("#sharedMediaContextMenu");
                    menu.style.top = e.clientY + "px";
                    menu.style.left = e.clientX + "px";
                    menu.classList.add("visible");
                    document.querySelector("#sharedMediaContextBackdrop").classList.add("visible");
                }

                function loadSharedMedia() {
                    var container = document.querySelector("#sharedMediaContainer");
                    container.textContent = "";
                    var loading = document.createElement("div");
                    loading.className = "shared-media-loading";
                    loading.textContent = "Loading...";
                    container.append(loading);

                    ApiClient.ajax({
                        url: ApiClient.getUrl("Plugins/ShareWithUser/SharedMedia"),
                        type: "GET",
                        dataType: "json",
                    })
                        .then(function (data) {
                            renderSharedMedia(data, container);
                        })
                        .catch(function (err) {
                            console.error("[ShareWithUser] Failed to load shared media:", err);
                            container.textContent = "";
                            var msg = document.createElement("div");
                            msg.className = "shared-media-empty";
                            msg.textContent = "Failed to load shared media.";
                            container.append(msg);
                        });
                }

                function renderSharedMedia(data, container) {
                    container.textContent = "";
                    if (!data || data.length === 0) {
                        var msg = document.createElement("div");
                        msg.className = "shared-media-empty";
                        msg.textContent = "No users found.";
                        container.append(msg);
                        return;
                    }

                    data.forEach(function (userGroup) {
                        var groupEl = document.createElement("div");
                        groupEl.className = "shared-media-user-group";

                        var headerEl = document.createElement("div");
                        headerEl.className = "shared-media-user-header";

                        var avatarEl = document.createElement("img");
                        avatarEl.className = "shared-media-avatar";
                        avatarEl.src = ApiClient.getUrl("Users/" + userGroup.UserId + "/Images/Primary");
                        avatarEl.alt = "";
                        headerEl.append(avatarEl);

                        var usernameEl = document.createElement("div");
                        usernameEl.className = "shared-media-username";
                        usernameEl.textContent = userGroup.Username;
                        headerEl.append(usernameEl);

                        groupEl.append(headerEl);

                        if (!userGroup.Items || userGroup.Items.length === 0) {
                            var emptyMsg = document.createElement("div");
                            emptyMsg.className = "shared-media-empty";
                            emptyMsg.textContent = "No shared media or full library access";
                            groupEl.append(emptyMsg);
                        } else {
                            var listEl = document.createElement("ul");
                            listEl.className = "shared-media-list";

                            userGroup.Items.forEach(function (item) {
                                var li = document.createElement("li");
                                li.setAttribute("data-item-id", item.Id);

                                var iconSpan = document.createElement("span");
                                iconSpan.className = "material-icons item-icon";
                                iconSpan.title = item.TypeDisplayName;
                                iconSpan.textContent = item.Icon;
                                li.append(iconSpan);

                                var link = document.createElement("a");
                                link.href = "#/details?id=" + item.Id;
                                link.textContent = item.Name;
                                li.append(link);

                                listEl.append(li);
                            });

                            groupEl.append(listEl);
                        }

                        container.append(groupEl);
                    });
                }

                // Delegate contextmenu events on list items
                document.querySelector("#sharedMediaContainer").addEventListener("contextmenu", function (e) {
                    var li = e.target.closest("li[data-item-id]");
                    if (!li) return;
                    e.preventDefault();
                    var itemId = li.getAttribute("data-item-id");
                    var userGroup = li.closest(".shared-media-user-group");
                    var username = userGroup ? userGroup.querySelector(".shared-media-username").textContent : "";
                    showContextMenu(itemId, username, e);
                });
            </script>
        </div>
    </body>
</html>
