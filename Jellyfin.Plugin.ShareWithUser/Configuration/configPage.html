<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>ShareWithUser</title>
</head>
<body>
    <div id="sharewithuserPage" data-role="page" class="page type-interior pluginConfigurationPage">
        <div data-role="content">
            <div class="content-primary">
                <h1>ShareWithUser</h1>
                <p class="flex align-items-center justify-content-center">
                    <a is="emby-button" class="button-link" href="https://github.com" target="_blank" rel="noopener noreferrer">
                        GitHub
                    </a>
                </p>

                <div class="inputBlock">
                    <label class="inputLabel">
                        <span>Enable Plugin</span>
                        <input type="checkbox" is="emby-toggle" id="isEnabled" />
                    </label>
                    <div class="fieldDescription">Enable or disable the ShareWithUser plugin.</div>
                </div>

                <br />
                <button is="emby-button" type="button" class="raised button-submit block emby-button" data-modal="save">
                    Save
                </button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('sharewithuserPage').addEventListener('pageshow', function () {
            Dashboard.showLoadingMsg();
            ApiClient.getPluginConfiguration('d5b7527c-3c98-4813-8fe7-ce7b31022c53').then(function (config) {
                document.getElementById('isEnabled').checked = config.IsEnabled;
                Dashboard.hideLoadingMsg();
            });
        });

        document.getElementById('sharewithuserPage').addEventListener('submit', function (e) {
            e.preventDefault();
            Dashboard.showLoadingMsg();
            ApiClient.getPluginConfiguration('d5b7527c-3c98-4813-8fe7-ce7b31022c53').then(function (config) {
                config.IsEnabled = document.getElementById('isEnabled').checked;
                ApiClient.updatePluginConfiguration('d5b7527c-3c98-4813-8fe7-ce7b31022c53', config).then(function () {
                    Dashboard.processPluginConfigurationUpdateResult();
                });
            });
            return false;
        });
    </script>
</body>
</html>
